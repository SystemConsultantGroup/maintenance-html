<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Maintenance | SCG</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #05070a;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #05070a;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>
    <iframe id="maintenance-frame" title="Maintenance Content"></iframe>

    <script>
        (function () {
            const pages = [
                'maintenance_2d.html',
                'maintenance_terminal.html',
                'maintenance_obinox.html'
            ];
            const randomPage = pages[Math.floor(Math.random() * pages.length)];
            const frame = document.getElementById('maintenance-frame');
            const loader = document.getElementById('loader');

            frame.src = randomPage;

            frame.onload = function () {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            };
        })();
    </script>
</body>

</html>
