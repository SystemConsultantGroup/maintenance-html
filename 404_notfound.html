<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | SCG</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #f43f5e;
            --accent-light: #fb7185;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-accent: #fecdd3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'SUIT', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Shadows */
        .ambient-glow {
            position: absolute;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.12) 0%, transparent 70%);
            top: -20%;
            left: -10%;
            z-index: 0;
            animation: pulse 15s ease-in-out infinite alternate;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 50vmax;
            height: 50vmax;
            background: radial-gradient(circle, rgba(251, 113, 133, 0.08) 0%, transparent 70%);
            bottom: -10%;
            right: -5%;
            z-index: 0;
            animation: pulse 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(5%, 5%);
            }
        }

        .container {
            width: 90%;
            max-width: 1000px;
            z-index: 10;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 4rem;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Image Styling */
        .hero-section {
            position: relative;
        }

        .hero-image-container {
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 32px;
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s ease;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0);
            }

            50% {
                transform: translateY(-15px) rotate(-1deg);
            }
        }

        .code-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-light);
            padding: 6px 14px;
            border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Content Styling */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .error-code {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            color: var(--accent-light);
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* Status Cards */
        .status-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-bottom: 1rem;
        }

        .terminal-mimic {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .terminal-mimic span::before {
            content: "> ";
            color: var(--text-secondary);
        }

        .cursor {
            width: 8px;
            height: 1.2em;
            background-color: var(--accent-light);
            display: inline-block;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* Home Button */
        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: fit-content;
        }

        .cta-button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(244, 63, 94, 0.4);
            filter: brightness(1.1);
        }

        .cta-button svg {
            transition: transform 0.3s ease;
        }

        .cta-button:hover svg {
            transform: translateX(-4px);
        }

        .cta-link {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.6;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .cta-link:hover {
            opacity: 1;
            color: var(--accent-light);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
                padding-bottom: 6rem;
            }

            .hero-section {
                max-width: 450px;
                margin: 0 auto;
            }

            .cta-container {
                align-items: center;
            }

            h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <main class="container">
        <section class="hero-section">
            <div class="hero-image-container">
                <div class="code-badge">HTTP_ERROR_404</div>
                <img src="resources/404_notfund_2d.png" alt="404 Not Found" class="hero-image">
            </div>
        </section>

        <section class="content-section">
            <div class="error-code">ERROR: PAGE_MISSING_FROM_FRIDGE</div>
            <h1>앗, 누가 페이지를<br>다 먹었나요?</h1>
            <p class="description">
                냉장고를 샅샅이 뒤져봤지만, 요청하신 페이지는 찾을 수 없었습니다.<br>
                어젯밤 배고픈 개발자가 야식으로 먹어버렸을지도 몰라요.
            </p>

            <div class="status-container">
                <div class="terminal-mimic">
                    <span id="typer">냉장고 뒤지는 중...</span>
                    <div class="cursor"></div>
                </div>
            </div>

            <div class="cta-container">
                <a href="maintenance.html" class="cta-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>안전한 홈으로 돌아가기</span>
                </a>
                <a href="https://scg.skku.ac.kr" class="cta-link">
                    <span>이거 버그 아닌가요? 신고하기</span>
                </a>
            </div>
        </section>
    </main>

    <footer>
        &copy; <span id="year"></span> SCG Consultant Group. All rights reserved.
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const phrases = [
            "냉장고 안쪽까지 살피는 중...",
            "우유 뒤에 숨었나 확인 중...",
            "개발자 입가에 묻은 부스러기 확인 중...",
            "야식 먹은 흔적 추적 중...",
            "빈 접시만 발견됨...",
            "404 에러와 함께 소화됨...",
            "혹시 냉동실에 있나? (매우 춥음)",
            "이미지 속 간식들이 맛있어 보임...",
            "새로운 맛집(페이지) 검색 중..."
        ];

        let index = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typer = document.getElementById("typer");

        function type() {
            const current = phrases[index];
            if (isDeleting) {
                typer.textContent = current.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typer.textContent = current.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 40 : 100;

            if (!isDeleting && charIndex === current.length) {
                typeSpeed = 3000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                index = (index + 1) % phrases.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        setTimeout(type, 1000);

        // Parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const hero = document.querySelector('.hero-image');
            if (hero) {
                hero.style.transform = `translate(${moveX}px, ${moveY}px) translateY(-15px) rotate(-1deg)`;
            }
        });
    </script>
</body>

</html>
